<style>
  :root{
    color-scheme: dark;
    --nori:#100d0a; --char:#1a1611; --char2:#231d16; --raise:#2b2419;
    --rice:#f3ebdc; --rice-dim:#c3b8a4; --rice-faint:#8f8674;
    --lantern:#ec5a22; --lantern-hi:#ff7a45; --salmon:#f4a279; --alpine:#8fb0c4; --wasabi:#accf4e;
    --line:rgba(243,235,220,.12); --line-soft:rgba(243,235,220,.07);
    --sans:"Helvetica Neue",Helvetica,"Segoe UI",system-ui,Arial,sans-serif;
    --serif:Georgia,"Times New Roman",serif;
    --mono:ui-monospace,"SF Mono","Menlo","Consolas",monospace;
    --wrap:1080px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0; background:var(--nori); color:var(--rice); font-family:var(--sans);
    font-size:17px; line-height:1.55; -webkit-font-smoothing:antialiased; overflow-x:hidden;}
  img{max-width:100%; display:block}
  a{color:inherit}
  ::selection{background:var(--lantern); color:#fff}
  :focus-visible{outline:2px solid var(--lantern-hi); outline-offset:3px; border-radius:3px}
  .wrap{width:min(100% - 40px, var(--wrap)); margin-inline:auto}
  .eyebrow{font-family:var(--mono); font-size:12px; letter-spacing:.32em; text-transform:uppercase; color:var(--salmon); margin:0 0 14px;}
  h2.sec{font-weight:800; font-size:clamp(28px,5vw,44px); line-height:1.04; letter-spacing:-.02em; margin:0 0 6px; text-wrap:balance;}

  /* language switch */
  .langbar{position:fixed; top:16px; right:16px; z-index:60; display:flex; gap:2px; padding:4px;
    background:rgba(16,13,10,.6); backdrop-filter:blur(8px); border:1px solid var(--line); border-radius:30px}
  .langbar button{border:0; background:transparent; color:var(--rice-dim); font-family:var(--mono); font-size:12px;
    letter-spacing:.08em; padding:6px 11px; border-radius:20px; cursor:pointer; transition:.14s}
  .langbar button:hover{color:var(--rice)}
  .langbar button.on{background:var(--lantern); color:#fff}

  /* hero */
  .hero{position:relative; min-height:min(94vh,780px); display:flex; align-items:flex-end; overflow:hidden}
  .hero__img{position:absolute; inset:0; background:#000}
  .hero__img img{width:100%; height:100%; object-fit:cover; opacity:.9; animation:kb 26s ease-in-out infinite alternate}
  @keyframes kb{from{transform:scale(1.04)}to{transform:scale(1.12)}}
  .hero__scrim{position:absolute; inset:0;
    background:radial-gradient(120% 80% at 50% -10%, rgba(236,90,34,.20), transparent 55%),
      linear-gradient(180deg, rgba(16,13,10,.35) 0%, rgba(16,13,10,.15) 42%, rgba(16,13,10,.82) 82%, var(--nori) 100%);}
  .hero__inner{position:relative; width:min(100% - 40px,var(--wrap)); margin-inline:auto; padding:0 0 clamp(34px,6vw,64px)}
  .brandline{display:flex; align-items:center; gap:14px; margin-bottom:20px}
  .brandline .dot{width:9px;height:9px;border-radius:50%;background:var(--wasabi);animation:pulse 2.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(172,207,78,.55)}70%{box-shadow:0 0 0 9px rgba(172,207,78,0)}100%{box-shadow:0 0 0 0 rgba(172,207,78,0)}}
  .brandline .status{font-family:var(--mono); font-size:12.5px; letter-spacing:.1em; color:var(--rice-dim)}
  .wordmark{font-weight:800; letter-spacing:-.03em; line-height:.9; font-size:clamp(64px,17vw,168px); margin:0; text-transform:uppercase}
  .wordmark em{font-family:var(--serif); font-style:italic; font-weight:400; color:var(--lantern); letter-spacing:-.01em}
  .wm-sub{font-family:var(--mono); letter-spacing:.42em; text-transform:uppercase; font-size:13px; color:var(--salmon); margin-top:16px}
  .tagline{font-size:clamp(18px,2.6vw,24px); max-width:32ch; margin:16px 0 0; color:var(--rice)}
  .tagline .sub{font-family:var(--serif); font-style:italic; color:var(--rice-dim); display:block; font-size:.82em; margin-top:6px}
  .rating{display:inline-flex; align-items:center; gap:10px; margin-top:22px; font-family:var(--mono); font-size:13px; color:var(--rice-dim)}
  .rating b{color:var(--rice); font-weight:700}
  .stars{color:var(--lantern-hi); letter-spacing:2px}
  .cta{display:flex; flex-wrap:wrap; gap:12px; margin-top:26px}
  .btn{display:inline-flex; align-items:center; gap:9px; font-weight:700; font-size:15px; padding:14px 22px; border-radius:40px;
    text-decoration:none; border:1px solid transparent; cursor:pointer; transition:transform .14s ease, background .14s ease, border-color .14s ease}
  .btn:hover{transform:translateY(-2px)}
  .btn--wa{background:var(--lantern); color:#fff}
  .btn--wa:hover{background:var(--lantern-hi)}
  .btn--ghost{background:rgba(243,235,220,.06); color:var(--rice); border-color:var(--line)}
  .btn--ghost:hover{border-color:var(--salmon)}
  .btn svg{width:18px;height:18px;flex:none}

  .strip{border-block:1px solid var(--line); background:var(--char)}
  .strip__grid{display:grid; grid-template-columns:repeat(3,1fr)}
  .strip__cell{padding:22px 24px; border-inline-start:1px solid var(--line-soft)}
  .strip__cell:first-child{border-inline-start:0}
  .strip__k{font-family:var(--mono); font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--rice-faint); margin:0 0 7px}
  .strip__v{margin:0; font-size:15.5px; line-height:1.45}
  .strip__v a{color:var(--salmon); text-decoration:none}
  .strip__v a:hover{text-decoration:underline}
  .tags{display:flex; gap:8px; flex-wrap:wrap; margin-top:9px}
  .tag{font-family:var(--mono); font-size:11px; letter-spacing:.06em; color:var(--rice-dim); border:1px solid var(--line); border-radius:20px; padding:4px 11px}

  section{padding:clamp(56px,9vw,104px) 0}
  .menu-head{display:flex; justify-content:space-between; align-items:flex-end; gap:20px; flex-wrap:wrap; margin-bottom:40px}
  .menu-head p.note{margin:10px 0 0; color:var(--rice-dim); font-size:14px; max-width:40ch}
  .cur{font-family:var(--mono); font-size:12px; color:var(--rice-faint); letter-spacing:.1em; white-space:nowrap}

  .menu-grid{display:grid; grid-template-columns:1fr 1fr; gap:clamp(28px,5vw,60px)}
  .mcol{display:flex; flex-direction:column; gap:34px}
  .mgroup > h3{font-weight:800; font-size:19px; letter-spacing:.01em; margin:0 0 4px}
  .mgroup > .rule{height:1px; background:var(--line); margin:12px 0 6px}
  .item{display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:14px; padding:10px 0; border-bottom:1px solid var(--line-soft)}
  .item:last-child{border-bottom:0}
  .item__name{font-size:15.5px; line-height:1.3}
  .item__price{font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:14px; color:var(--rice-dim); white-space:nowrap}
  .stepper{display:inline-flex; align-items:center; border:1px solid var(--line); border-radius:22px; overflow:hidden; background:var(--char)}
  .stepper button{width:30px; height:30px; border:0; background:transparent; color:var(--rice); font-size:17px; line-height:1; cursor:pointer; font-family:var(--mono)}
  .stepper button:hover{background:var(--raise); color:var(--lantern-hi)}
  .stepper .q{min-width:22px; text-align:center; font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:14px}
  .item.active .stepper{border-color:var(--lantern)}
  .item__nostep{font-family:var(--mono); font-size:11px; color:var(--rice-faint); letter-spacing:.05em}

  .band{position:relative; margin:0; border-radius:18px; overflow:hidden; border:1px solid var(--line)}
  .band img{width:100%; height:100%; object-fit:cover}
  .band__cap{position:absolute; left:16px; bottom:14px; font-family:var(--mono); font-size:11.5px; letter-spacing:.12em; text-transform:uppercase;
    color:#fff; background:rgba(16,13,10,.55); backdrop-filter:blur(3px); padding:6px 12px; border-radius:20px}
  .foodrow{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:44px}
  .foodrow .band{aspect-ratio:3/4}

  .orderbar{position:fixed; left:0; right:0; bottom:0; z-index:50; transform:translateY(130%); transition:transform .28s cubic-bezier(.2,.8,.2,1);
    background:rgba(20,17,13,.95); backdrop-filter:blur(10px); border-top:1px solid var(--line)}
  .orderbar.show{transform:translateY(0)}
  .orderbar__in{width:min(100% - 32px,var(--wrap)); margin-inline:auto; display:flex; align-items:center; gap:14px; padding:12px 0; flex-wrap:wrap}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:22px; overflow:hidden}
  .seg button{border:0; background:transparent; color:var(--rice-dim); font-family:var(--mono); font-size:12px; padding:7px 12px; cursor:pointer}
  .seg button.on{background:var(--raise); color:var(--rice)}
  .orderbar__sum{font-family:var(--mono); font-size:12.5px; color:var(--rice-dim); line-height:1.25}
  .orderbar__sum b{color:var(--rice); font-size:16px; display:block; font-variant-numeric:tabular-nums}
  .orderbar__spacer{flex:1}
  .orderbar .btn--wa{padding:12px 20px}
  .orderbar__clear{background:transparent;border:0;color:var(--rice-faint);font-family:var(--mono);font-size:12px;cursor:pointer;text-decoration:underline}

  .order{background:linear-gradient(180deg,var(--char) 0%, var(--nori) 100%); border-block:1px solid var(--line)}
  .order .steps{display:grid; grid-template-columns:repeat(3,1fr); gap:22px; margin-top:38px}
  .step{padding:24px; border:1px solid var(--line); border-radius:16px; background:rgba(243,235,220,.02)}
  .step .n{font-family:var(--mono); font-size:12px; color:var(--lantern); letter-spacing:.2em}
  .step h4{margin:12px 0 6px; font-size:18px; font-weight:700}
  .step p{margin:0; color:var(--rice-dim); font-size:14.5px}

  .place-grid{display:grid; grid-template-columns:1.15fr .85fr; gap:20px; margin-top:40px}
  .place-grid .band{aspect-ratio:auto; min-height:100%}
  .place-copy{align-self:center}
  .place-copy p{color:var(--rice-dim); font-size:16px; max-width:44ch}
  .place-copy p .hl{color:var(--rice); font-style:italic; font-family:var(--serif)}
  .quote{font-family:var(--serif); font-style:italic; font-size:clamp(19px,3vw,26px); line-height:1.4; color:var(--rice); margin:0 0 8px; text-wrap:balance}
  .quote + .qby{font-family:var(--mono); font-size:12px; color:var(--rice-faint); letter-spacing:.08em}

  footer{background:var(--char); border-top:1px solid var(--line); padding:clamp(48px,7vw,80px) 0 40px}
  .foot-grid{display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:36px}
  .foot h5{font-family:var(--mono); font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--rice-faint); margin:0 0 14px}
  .foot p,.foot a{font-size:15px; color:var(--rice-dim); text-decoration:none; margin:0 0 8px; line-height:1.5}
  .foot a:hover{color:var(--salmon)}
  .foot .big{font-weight:800; font-size:28px; color:var(--rice); letter-spacing:-.02em; text-transform:uppercase; margin-bottom:6px}
  .foot .big em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--lantern)}
  .footnote{margin-top:40px; padding-top:20px; border-top:1px solid var(--line-soft); font-family:var(--mono); font-size:11.5px; color:var(--rice-faint); line-height:1.7; display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap}

  @media (max-width:820px){
    .strip__grid{grid-template-columns:1fr}
    .strip__cell{border-inline-start:0; border-top:1px solid var(--line-soft)}
    .strip__cell:first-child{border-top:0}
    .menu-grid{grid-template-columns:1fr; gap:34px}
    .order .steps{grid-template-columns:1fr}
    .foodrow{grid-template-columns:1fr 1fr}
    .place-grid{grid-template-columns:1fr}
    .foot-grid{grid-template-columns:1fr; gap:26px}
  }
  @media (max-width:480px){ .foodrow{grid-template-columns:1fr} }
  @media (prefers-reduced-motion:reduce){ .hero__img img{animation:none} .brandline .dot{animation:none} .btn:hover{transform:none} }
</style>

  function refresh(){
    var t=T[lang], n=0, sub=0, lines=[];
    for(var id in qty){ if(qty[id].n>0){ var m=priceOf(id); if(!m) continue; n+=qty[id].n; sub+=qty[id].n*m.p; lines.push(qty[id].n+"× "+m.name[lang]+" — "+(qty[id].n*m.p)+" GEL"); } }
    var deliv = (mode==="delivery" && n>0) ? DELIVERY_FEE : 0;
    var total = sub + deliv;
    obCount.textContent = n+" "+t.unit;
    obTotal.textContent = total+" ₾";
    bar.classList.toggle("show", n>0);
    var msg = t.waHi+"\n"+lines.join("\n")+"\n\n"+t.waSub+": "+sub+" GEL\n"+
      (mode==="delivery" ? t.waDel+": "+DELIVERY_FEE+" GEL" : t.waPick)+"\n"+t.waTot+": "+total+" GEL\n"+t.waName;
    obSend.href="https://wa.me/"+WA+"?text="+encodeURIComponent(msg);
  }

  function applyLang(l){
    lang=l; document.documentElement.lang=l;
    document.querySelectorAll("[data-t]").forEach(function(e){ e.textContent=T[l][e.dataset.t]; });
    document.querySelectorAll("[data-th]").forEach(function(e){ e.innerHTML=T[l][e.dataset.th]; });
    document.querySelectorAll(".langbar button").forEach(function(b){ b.classList.toggle("on", b.dataset.lang===l); });
    // hero/footer plain WhatsApp links get a localized greeting
    var hi=encodeURIComponent(T[l].waHi);
    document.getElementById("heroWa").href="https://wa.me/"+WA+"?text="+hi;
    document.getElementById("footWa").href="https://wa.me/"+WA+"?text="+hi;
    renderMenu(); refresh();
  }

  grid.addEventListener("click",function(e){
    var b=e.target.closest("button[data-d]"); if(!b) return;
    var row=b.closest(".item"), id=row.dataset.id;
    qty[id].n=Math.max(0, qty[id].n + (b.dataset.d==="1"?1:-1));
    row.querySelector("[data-q]").textContent=qty[id].n;
    row.classList.toggle("active", qty[id].n>0);
    refresh();
  });
  document.getElementById("modeSeg").addEventListener("click",function(e){
    var b=e.target.closest("button[data-mode]"); if(!b) return;
    mode=b.dataset.mode;
    this.querySelectorAll("button").forEach(function(x){x.classList.toggle("on",x.dataset.mode===mode);});
    refresh();
  });
  document.getElementById("obClear").addEventListener("click",function(){
    for(var k in qty) qty[k].n=0;
    grid.querySelectorAll("[data-q]").forEach(function(q){q.textContent="0";});
    grid.querySelectorAll(".item.active").forEach(function(r){r.classList.remove("active");});
    refresh();
  });
  document.querySelector(".langbar").addEventListener("click",function(e){
    var b=e.target.closest("button[data-lang]"); if(b) applyLang(b.dataset.lang);
  });

  applyLang("ka");
})();
</script>
