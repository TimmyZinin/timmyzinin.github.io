<body>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const COLORS = {
      bg: "#0a0a0a",
      bgDark: "#050510",
      neonPink: "#ff00ff",
      neonGreen: "#39ff14",
      neonCyan: "#00ffff",
      neonYellow: "#ffff00",
      neonOrange: "#ff6600",
      neonRed: "#ff0040",
      neonPurple: "#bf00ff",
      neonBlue: "#4444ff",
      dimGreen: "#0a3a0a",
      dimPink: "#3a0a3a",
      dimCyan: "#0a2a3a",
      dimYellow: "#3a3a0a",
      white: "#ffffff",
      gray: "#888888",
      darkGray: "#333333",
    };

    const pixelBoxShadow = (color) =>
      `inset 0 0 0 2px ${color}, 0 0 20px ${color}40, 0 0 60px ${color}20`;

    const font = `'Press Start 2P', monospace`;

    function ScanlineOverlay() {
      return (
        <div
          style={{
            position: "fixed",
            top: 0, left: 0, right: 0, bottom: 0,
            pointerEvents: "none",
            zIndex: 9999,
            background: "repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px)",
          }}
        />
      );
    }

    function GlowText({ children, color, size = 10, style = {} }) {
      return (
        <div
          style={{
            fontFamily: font,
            fontSize: size,
            color: color,
            textShadow: `0 0 10px ${color}, 0 0 20px ${color}, 0 0 40px ${color}80`,
            letterSpacing: 2,
            ...style,
          }}
        >
          {children}
        </div>
      );
    }

    function PixelBar({ value, max, color, label, price }) {
      const pct = (value / max) * 100;
      return (
        <div style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontFamily: font, fontSize: 7, color: COLORS.white, letterSpacing: 1 }}>{label}</span>
            <span style={{ fontFamily: font, fontSize: 7, color: color }}>{price}</span>
          </div>
          <div style={{ height: 12, background: COLORS.bgDark, border: `2px solid ${color}40`, position: "relative", imageRendering: "pixelated" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: `repeating-linear-gradient(90deg, ${color} 0px, ${color} 4px, ${color}80 4px, ${color}80 8px)`, boxShadow: `0 0 10px ${color}60`, transition: "width 1s ease" }} />
          </div>
        </div>
      );
    }

    function PixelBox({ children, borderColor, title, style = {} }) {
      return (
        <div style={{ border: `3px solid ${borderColor}`, background: `${borderColor}08`, padding: 16, position: "relative", boxShadow: pixelBoxShadow(borderColor), imageRendering: "pixelated", ...style }}>
          {title && (
            <div style={{ position: "absolute", top: -10, left: 12, background: COLORS.bg, padding: "0 8px", fontFamily: font, fontSize: 8, color: borderColor, textShadow: `0 0 10px ${borderColor}`, letterSpacing: 1 }}>
              {title}
            </div>
          )}
          {children}
        </div>
      );
    }

    function PixelDivider({ color }) {
      return (
        <div style={{ height: 3, margin: "24px 0", background: `repeating-linear-gradient(90deg, ${color} 0px, ${color} 8px, transparent 8px, transparent 16px)`, boxShadow: `0 0 10px ${color}40` }} />
      );
    }

    function StarRating({ score, max = 5, color }) {
      return (
        <span style={{ fontFamily: font, fontSize: 8, letterSpacing: 2 }}>
          {Array.from({ length: max }, (_, i) => (
            <span key={i} style={{ color: i < score ? color : COLORS.darkGray }}>&#9733;</span>
          ))}
        </span>
      );
    }

    function AgentCard({ name, origin, price, type, stars, color, desc, sweBench }) {
      return (
        <div style={{ border: `2px solid ${color}`, background: `linear-gradient(180deg, ${color}10 0%, ${COLORS.bgDark} 100%)`, padding: 12, minWidth: 180, position: "relative", boxShadow: `0 0 15px ${color}30` }}>

          </div>
        </div>
      );
    }

    function BlinkText({ children, color, style = {} }) {
      const [visible, setVisible] = useState(true);
      useEffect(() => {
        const iv = setInterval(() => setVisible((v) => !v), 800);
        return () => clearInterval(iv);
      }, []);
      return (
        <span style={{ fontFamily: font, color: visible ? color : "transparent", textShadow: visible ? `0 0 10px ${color}` : "none", transition: "all 0.1s", ...style }}>
          {children}
        </span>
      );
    }
